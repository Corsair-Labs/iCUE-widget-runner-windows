  r.style.setProperty('--layout-base',lb+'px');
  r.style.setProperty('--fs-primary',Math.max(18,Math.min(180,lb*0.11))+'px');

// Audio bridge
let rawL=0,rawR=0,usingSim=true,bridgeOk=false,pollTimer=null;
const BRIDGE_URL='http://127.0.0.1:3748/levels';
const POLL_MS=4;  // 4ms poll — max responsiveness

/* ══ AUDIO BRIDGE ════════════════════════════════════════════ */
function startAudioBridge(){ if(!pollTimer) pollAudio(); }
async function pollAudio(){
  try{
    const resp=await fetch(BRIDGE_URL,{cache:'no-store',signal:AbortSignal.timeout(120)});
    if(!resp.ok)throw new Error('bad');
    const d=await resp.json();
    rawL=isFinite(d.L)?Math.min(1,Math.max(0,d.L)):0;
    rawR=isFinite(d.R)?Math.min(1,Math.max(0,d.R)):0;
    usingSim=false; bridgeOk=true;
    updateBridgeIndicator(true);
  }catch(e){
    usingSim=true;
    if(bridgeOk){bridgeOk=false;updateBridgeIndicator(false);}
  }finally{
    pollTimer=setTimeout(pollAudio,POLL_MS);
  }
}
function updateBridgeIndicator(live){
  const el=document.getElementById('bridgeIndicator');
  if(!el)return;
  el.textContent=live?'\u25CF LIVE':'\u25CF SIM';
  el.style.color=live?'#44ee22':'#556644';
}

/* ══ SENSOR PLUGIN (fallback) ════════════════════════════════ */
let sensorApi=null,sensorIdL=null,sensorIdR=null;
function onSensorPluginReady(){
  sensorApi=new SimpleSensorApiWrapper(window.plugins.Sensorsdataprovider);
  window.plugins.Sensorsdataprovider.sensorValueChanged.connect((id,val)=>{
    if(bridgeOk)return;
    const n=Math.min(1,Math.max(0,parseFloat(val)/100));
    if(id===sensorIdL)rawL=n;
    if(id===sensorIdR)rawR=n;
    if(sensorIdL&&sensorIdR)usingSim=false;
  });
}

/* ══ METER DRAWING ═══════════════════════════════════════════
   Pivot is BELOW canvas bottom so needle arc fills face like real M-508.
   All scale colors pure green — no red.  Logarithmic watt spacing.
   Canvas rendered at 2× device pixel ratio for crispness.
═══════════════════════════════════════════════════════════════ */
function drawMeter(id,level,peakLevel,t){
  const c=document.getElementById(id); if(!c)return;

  // ── Hi-DPI: render at 2× pixel ratio ──────────────────────
  const dpr=window.devicePixelRatio||1;
  const dispW=c.parentElement.clientWidth||300;
  const dispH=c.parentElement.clientHeight||200;
  if(c.width!==dispW*dpr||c.height!==dispH*dpr){
    c.width=dispW*dpr; c.height=dispH*dpr;
    c.style.width=dispW+'px'; c.style.height=dispH+'px';
  }
  const ctx=c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=dispW, H=dispH;

  ctx.clearRect(0,0,W,H);
  const isOnkyo=(t.id==='onkyo');
  const isLight=(t.id==='accuphase');

  // ── Background ─────────────────────────────────────────────
  if(isLight){
    ctx.fillStyle=t.meterBg; ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=t.meterBg; ctx.fillRect(0,0,W,H);
    const amb=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.7);
    amb.addColorStop(0,t.faceGlow); amb.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=amb; ctx.fillRect(0,0,W,H);
  }

  const lvl=(!powered||muted)?0:dimmed?level*0.4:level;
  const pk =(!powered||muted)?0:dimmed?peakLevel*0.4:peakLevel;

  if(t.arcStyle==='needle'){
    // ══ GEOMETRY ════════════════════════════════════════════════════
    // Calibrated from reference M-508 photo:
    //   R = W*0.38 (slightly smaller for proper negative space)
    //   cy = H*0.946 (pivot visible near canvas bottom)
    //   minA=-0.82π, maxA=-0.18π (symmetric, 0.01W at ~16% left, 500W at ~84%)
    //   Arc top at H*0.28 from top
    //   Rail at ~H*0.68 from top
    //   POWER at H*0.85, ONKYO at H*0.92, Wall at H*0.97

    const cx = W / 2;
    const R  = Math.min(W*0.546, H*0.980);  // 40% larger — flatter, wider arc
    const cy = R + H * 0.28;                // keeps arc top at H*0.28 regardless of R

    const minA = -Math.PI * 0.756;  // 20% shorter arc
    const maxA = -Math.PI * 0.244;
    const midA = (minA + maxA) / 2;

    const px2 = (r,a) => cx + Math.cos(a)*r;
    const py2 = (r,a) => cy + Math.sin(a)*r;
    const sc  = R / 370;

    // ══ WATT POSITIONS (power law, fitted from photo) ════════════════
    function wattPos(w){
      return Math.pow(Math.max(0,(Math.log10(w)+2)/4.699), 1.6);
    }
    const wm=[
      ['0.01',0.01],['0.1',0.1],['0.5',0.5],['1',1],
      ['5',5],['10',10],['50',50],['200',200],['500',500]
    ].map(([l,w])=>[l,wattPos(w)]);

    // Rail and tick start
    const railR    = R * 0.762;
    const innerR   = railR + sc*4;
    const railThick = Math.max(sc*4.5,1.8);

    // ══ MAJOR TICK LENGTH — defined here so fine ticks can reference it ══
    const MAJ = sc*52;

    // ══ FINE TICKS — from innerR outward ════════════════════════════
    const fineWatts=[
      [0.02,'xs'],[0.03,'xs'],[0.04,'xs'],[0.05,'major'],[0.06,'xs'],[0.07,'xs'],[0.08,'xs'],[0.09,'xs'],
      [0.2,'xs'],[0.3,'xs'],[0.4,'xs'],[0.6,'xs'],[0.7,'xs'],[0.8,'xs'],[0.9,'xs'],
      [2,'xs'],[3,'xs'],[4,'xs'],[6,'xs'],[7,'xs'],[8,'xs'],[9,'xs'],
      [20,'xs'],[30,'xs'],[40,'xs'],[60,'xs'],[70,'xs'],[80,'xs'],[90,'xs'],
      [100,'xs'],[150,'xs'],[300,'xs'],[400,'xs']
    ];
    ctx.globalAlpha=0.70;
    fineWatts.forEach(([w,sz])=>{
      const f=wattPos(w); if(f<0||f>1)return;
      const a=minA+(maxA-minA)*f;
      // Lower extremes (outer edges of sweep) get 2× longer ticks
      // All fine ticks longer; 'major' same as MAJ; 'mid' medium; 'xs' standard
      const tl=sz==='major'?MAJ:(sz==='mid'?sc*28:sc*22);
      ctx.strokeStyle=t.scaleC; ctx.lineWidth=Math.max(0.65,sc*0.75);
      ctx.beginPath();
      ctx.moveTo(px2(innerR,a),    py2(innerR,a));
      ctx.lineTo(px2(innerR+tl,a), py2(innerR+tl,a));
      ctx.stroke();
    });
    ctx.globalAlpha=1;

    // ══ MAJOR TICKS — uniform length, upright labels ════════════════
    const fW      = Math.max(14,Math.min(23,sc*17.3));
    // MAJ already defined above

    ctx.font = `bold ${fW}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
    wm.forEach(([lbl,f])=>{
      const a=minA+(maxA-minA)*f;
      ctx.strokeStyle=t.scaleC; ctx.lineWidth=Math.max(0.9,sc*1.1);
      ctx.beginPath();
      ctx.moveTo(px2(innerR,a),    py2(innerR,a));
      ctx.lineTo(px2(innerR+MAJ,a),py2(innerR+MAJ,a));
      ctx.stroke();

      // Label: rotated with arc, strictly clipped to canvas
      const lR = innerR+MAJ+fW*0.9;
      const lx = px2(lR,a), ly = py2(lR,a);
      const margin = fW*0.6;
      if(lx>margin && lx<W-margin && ly>margin && ly<H-sc*30){
        ctx.save();
        ctx.translate(lx,ly); ctx.rotate(a+Math.PI/2);
        ctx.textAlign='center'; ctx.fillStyle=t.scaleC;
        ctx.fillText(lbl, 0, fW*0.36);
        ctx.restore();
      }
    });

    // ══ dB RAIL ══════════════════════════════════════════════════════
    ctx.strokeStyle=isLight?'#5a3604':'#060200';
    ctx.lineWidth=railThick+sc*4;
    ctx.beginPath(); ctx.arc(cx,cy,railR,minA,maxA); ctx.stroke();
    const rg=ctx.createLinearGradient(cx,cy-R,cx,cy);
    rg.addColorStop(0,t.railShineC); rg.addColorStop(0.4,t.railC); rg.addColorStop(1,t.railC);
    ctx.strokeStyle=rg; ctx.lineWidth=railThick;
    ctx.beginPath(); ctx.arc(cx,cy,railR,minA,maxA); ctx.stroke();

    // ══ DOT ROW — below rail ════════════════════════════════════════
    const db_fl=wattPos(0.02), db_fr=wattPos(500);
    const dBDots=[-40,-30,-20,-10,-5,0,4].map(db=>db_fl+(db+40)/44*(db_fr-db_fl));
    const dotR=railR-sc*4.5, dotN=80;
    // Pre-snap each dB position to nearest dot index for exact alignment
    const dBDotIdxs=new Set(dBDots.map(p=>Math.round(p*dotN)));
    for(let i=0;i<=dotN;i++){
      const f=i/dotN, a=minA+(maxA-minA)*f;
      const dx=px2(dotR,a), dy=py2(dotR,a);
      if(dx<1||dx>W-1||dy<1||dy>H*0.99)continue;
      const atDB=dBDotIdxs.has(i);
      ctx.fillStyle=t.scaleC;
      ctx.globalAlpha=atDB?0.80:0.38;
      ctx.beginPath();
      ctx.arc(dx,dy,atDB?Math.max(1.2,sc*1.15):Math.max(0.6,sc*0.68),0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // ══ dB LABELS — rotated ══════════════════════════════════════════
    const dbF   = Math.max(11,Math.min(18,sc*13.7));
    const dbLblR= railR-sc*6-dbF*1.6;
    const dm=[
      ['-40',db_fl], ['-30',db_fl+(db_fr-db_fl)/6], ['-20',db_fl+2*(db_fr-db_fl)/6],
      ['-10',db_fl+3*(db_fr-db_fl)/6], ['-5',db_fl+3.5*(db_fr-db_fl)/6],
      ['0',db_fl+4.5*(db_fr-db_fl)/6], ['+4',db_fr]
    ];
    ctx.globalAlpha=0.88;
    dm.forEach(([lbl,f])=>{
      const a=minA+(maxA-minA)*f;
      const lx=px2(dbLblR,a), ly=py2(dbLblR,a);
      if(lx>1&&lx<W-1&&ly>1&&ly<H*0.98){
        ctx.save();
        ctx.translate(lx,ly);
        // Do NOT rotate the zero labels — rotation makes '0' look like a slash
        if(lbl!=='0'&&lbl!=='+4') ctx.rotate(a+Math.PI/2);
        ctx.font=`${dbF}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
        ctx.textAlign='center';
        ctx.fillStyle=isLight?t.scaleC:'rgba(75,185,60,0.90)';
        ctx.fillText(lbl,0,dbF*0.38);
        ctx.restore();
      }
    });
    ctx.globalAlpha=1;

    // ══ WATTS 8Ω — centered above arc, generous space ════════════════
    const wlF = Math.max(14,Math.min(20,sc*15.8));
    const arcTopTickY = py2(innerR+MAJ, midA);  // top of highest tick
    ctx.font=`${wlF}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle=t.scaleC;
    // Place WATTS well above tick tips with generous space
    const wattsY = Math.max(wlF+4, arcTopTickY - wlF*1.5);
    ctx.fillText('WATTS 8\u03A9', cx, Math.min(wattsY, H*0.28));

    // dB label — center between rail and POWER
    const dbLF=Math.max(11,Math.min(18,sc*13.7));
    const dbCY=py2(dbLblR*0.85,midA)+dbLF*0.5;
    if(dbCY>wattsY+10&&dbCY<H*0.80){
      ctx.font=`bold ${dbLF}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle=t.scaleC;
      ctx.fillText('dB',cx,dbCY);
    }

    // ══ INNER WALL — thin dark strip at canvas bottom ════════════════
    const wallH=Math.max(sc*4,3);
    ctx.fillStyle='#020202';
    ctx.fillRect(0,H-wallH,W,wallH);
    ctx.fillStyle='rgba(0,45,5,0.22)';
    ctx.fillRect(0,H-wallH,W,1);

    // ══ POWER label — at H*0.87 (above wall, below dB section) ══════
    const pwrF=Math.max(15,Math.min(27,sc*19.5));
    ctx.font=`bold ${pwrF}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle=t.powerLabelC||t.arcC;
    if(powered&&!muted){ctx.shadowColor=t.powerLabelC||t.arcC; ctx.shadowBlur=6;}
    ctx.fillText('POWER',cx,H*0.87);
    ctx.shadowBlur=0;

    // ══ ONKYO — H*0.93, above wall ══════════════════════════════════
    if(t.onkyoLogoC&&isOnkyo){
      const onF=Math.max(10,Math.min(14,sc*9.4));
      ctx.font=`bold ${onF}px Serpentine, Orbitron, Rajdhani, 'Arial Narrow', Arial, sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle=t.onkyoLogoC; ctx.globalAlpha=0.58;
      ctx.shadowColor=t.onkyoLogoC; ctx.shadowBlur=3;
      ctx.fillText('ONKYO',W*0.04,H*0.93);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }

    // PEAK PROGRAM
    const ppF=Math.max(7,Math.min(10,sc*6.5));
    ctx.font=`${ppF}px 'Share Tech Mono',monospace`;
    ctx.textAlign='right'; ctx.globalAlpha=0.24;
    ctx.fillStyle='#1a6012';
    ctx.fillText('PEAK PROGRAM',W*0.97,H*0.97);
    ctx.globalAlpha=1;

    // ══ NEEDLE CHASER ARC ════════════════════════════════════════════
    const showArc=(typeof showNeedleChaser==='undefined')?true:showNeedleChaser;
    if(powered&&!muted&&showArc&&lvl>0.005){
      const arcA=minA+(maxA-minA)*lvl;
      const arcR2=R*0.877;
      ctx.strokeStyle=t.arcC; ctx.lineWidth=Math.max(1.5,sc*3.8);
      ctx.shadowColor=t.arcC; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.arc(cx,cy,arcR2,minA,arcA); ctx.stroke();
      ctx.shadowBlur=0;
      if((peakOn||optPeakHold)&&pk>0.02){
        const pkA=minA+(maxA-minA)*pk;
        ctx.strokeStyle=t.scaleC; ctx.lineWidth=Math.max(1.8,sc*2.0);
        ctx.shadowColor=t.scaleC; ctx.shadowBlur=5;
        ctx.beginPath(); ctx.arc(cx,cy,arcR2,pkA-0.01,pkA+0.01); ctx.stroke();
        ctx.shadowBlur=0;
      }
    }

    // ══ NEEDLE ═══════════════════════════════════════════════════════
    const needleR=R*0.88, cwLen=sc*14;
    const arcA2=powered?minA+(maxA-minA)*lvl:minA;
    ctx.save();
    ctx.strokeStyle=t.needleC; ctx.lineWidth=Math.max(0.9,sc*0.48); ctx.lineCap='round';
    if(powered){ctx.shadowColor=t.needleC; ctx.shadowBlur=3;}
    ctx.beginPath();
    ctx.moveTo(px2(cwLen,arcA2+Math.PI),py2(cwLen,arcA2+Math.PI));
    ctx.lineTo(px2(needleR,arcA2),py2(needleR,arcA2));
    ctx.stroke(); ctx.restore();

    // Pivot
    const pivR=Math.max(sc*2.0,1.8);
    ctx.fillStyle='#0a0a0a'; ctx.strokeStyle='#181818'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.arc(cx,cy,pivR,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=powered?t.scaleC:'#141414';
    ctx.beginPath(); ctx.arc(cx,cy,pivR*0.35,0,Math.PI*2); ctx.fill();

    // ══ POWER-OFF DIM ════════════════════════════════════════════════
    if(!powered){
      ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
    }

    // ══ GLASS HIGHLIGHT + LED GLOW (Onkyo, powered only) ═════════════
    if(isOnkyo&&powered){
      // White gloss band — top edge
      const gg=ctx.createLinearGradient(0,0,0,H*0.055);
      gg.addColorStop(0,'rgba(255,255,255,0.28)');
      gg.addColorStop(0.4,'rgba(255,255,255,0.07)');
      gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg; ctx.fillRect(0,0,W,H*0.08);

      // Two corner hotspots matching photo exactly
      [W*0.30, W*0.70].forEach(hx=>{
        const hg=ctx.createRadialGradient(hx,0,0,hx,1,W*0.07);
        hg.addColorStop(0,'rgba(160,255,160,0.78)');
        hg.addColorStop(0.3,'rgba(70,200,70,0.22)');
        hg.addColorStop(0.7,'rgba(0,150,15,0.04)');
        hg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=hg; ctx.fillRect(0,0,W,H*0.16);
      });

      // Green LED glow downward
      const lg=ctx.createLinearGradient(0,H*0.03,0,H*0.13);
      lg.addColorStop(0,t.ledTopC); lg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=lg; ctx.fillRect(0,H*0.03,W,H*0.10);

      // Diagonal sheen
      const sh=ctx.createLinearGradient(0,0,W*0.35,H*0.28);
      sh.addColorStop(0,'rgba(255,255,255,0.016)');
      sh.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);
    }


} else {
    // ── BARGRAPH (McIntosh, Yamaha, Proton, Adv Paris) ──────
    const sc=50, pad=5, sW=(W-pad*2-(sc-1)*2)/sc, sH=H-30, y0=10;
    const rs=Math.floor(sc*0.76), ys=Math.floor(sc*0.61);
    const actS=Math.floor(lvl*sc);
    const pkS=(peakOn||optPeakHold)?Math.floor(pk*sc):-1;

    // Draw segments
    for(let i=0;i<sc;i++){
      const x=pad+i*(sW+2), isRed=i>=rs, isYel=!isRed&&i>=ys;
      let col;
      if(i<=actS){
        col=isRed?t.bargraphRedC:isYel?t.bargraphYellowC:t.bargraphC;
        ctx.shadowColor=col;ctx.shadowBlur=3;
      } else {
        col=isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.03)';
        ctx.shadowBlur=0;
      }
      ctx.fillStyle=col;
      ctx.fillRect(x,y0,sW,sH);
      ctx.shadowBlur=0;
      if(i===pkS){ctx.fillStyle=t.scaleRedC;ctx.fillRect(x,y0,sW,sH);}
    }

    // dB labels
    const dbl=[['-40',0],['-20',0.22],['-10',0.38],['-6',0.50],['-3',0.62],['0',0.76],['+3',1]];
    const bgF=Math.max(9,Math.min(15,W*0.027));
    ctx.font=`${bgF}px Share Tech Mono,monospace`;ctx.textAlign='center';
    dbl.forEach(([l,f])=>{const x=pad+f*(W-pad*2);ctx.fillStyle=f>0.76?t.scaleRedC:t.scaleC;ctx.fillText(l,x,H-10)});

    // POWER label
    const bpwrF=Math.max(13,Math.min(22,W*0.040));
    ctx.font=`bold ${bpwrF}px Share Tech Mono,monospace`;ctx.textAlign='center';
    ctx.fillStyle=t.powerLabelC||t.arcC;
    ctx.shadowColor=t.powerLabelC||t.arcC;ctx.shadowBlur=5;
    ctx.fillText('POWER OUTPUT',W/2,H-bpwrF*0.3);
    ctx.shadowBlur=0;
  }
}

/* ══ ANIMATION LOOP ══════════════════════════════════════════ */
let optPeakHold=false;
function animate(){
  if(!animRunning)return;
  simTime+=0.055;
  if(!powered||muted){tL=0;tR=0;}
  else if(usingSim){
    const b=0.30+0.20*Math.sin(simTime*0.7)+0.10*Math.sin(simTime*1.3+0.5);
    const punch=Math.random()<0.05?Math.random()*0.40:0;
    tL=Math.min(1,b+punch+0.08*Math.sin(simTime*2.3)+0.03*Math.random());
    tR=Math.min(1,b+punch+0.08*Math.sin(simTime*1.9+1.1)+0.03*Math.random());
  } else {
    // Apply gain and direct assign
    tL=Math.min(1,rawL*meterGain); tR=Math.min(1,rawR*meterGain);
  }
  const dec=Math.max(0.02, userDec);  // slider-controlled decay, min near-zero
  // Zero-latency: for live audio, apply directly to display level
  // For sim, use the smooth tL/tR target
  const targetL = (!usingSim && powered && !muted) ? Math.min(1,rawL*meterGain) : tL;
  const targetR = (!usingSim && powered && !muted) ? Math.min(1,rawR*meterGain) : tR;
  // Attack: instant snap up; decay: exponential fall
  lL = targetL > lL ? targetL : lL - (lL-targetL)*dec;
  lR = targetR > lR ? targetR : lR - (lR-targetR)*dec;
  if(lL>pkL){pkL=lL;pkLt=120}else if(pkLt>0)pkLt--;else pkL=Math.max(0,pkL-0.003);
  if(lR>pkR){pkR=lR;pkRt=120}else if(pkRt>0)pkRt--;else pkR=Math.max(0,pkR-0.003);
  const t=THEMES[ci];
  drawMeter('canL',lL,pkL,t);
  drawMeter('canR',lR,pkR,t);
  const ll=document.getElementById('ledL'),lr=document.getElementById('ledR');
  if(ll){ll.style.background=powered&&!muted?(lL>0.75?t.scaleRedC:t.ledC):'transparent';ll.style.boxShadow=powered&&!muted&&lL>0.05?'0 0 5px '+t.ledGlow:'none'}
  if(lr){lr.style.background=powered&&!muted?(lR>0.75?t.scaleRedC:t.ledC):'transparent';lr.style.boxShadow=powered&&!muted&&lR>0.05?'0 0 5px '+t.ledGlow:'none'}
  requestAnimationFrame(animate);
}

/* ══ THEME APPLICATION ═══════════════════════════════════════ */
function applyTheme(idx){
  _bgCache.clear(); // invalidate static layer cache on theme change
  ci=idx;const t=THEMES[idx];
  const r=document.documentElement;
  const p={
    '--fp-bg':t.fpBg,'--top-bg':t.topBg,'--top-border':t.topBorder,
    '--brand-color':t.brandC,'--tagline-color':t.tagC,'--eac-color':t.eacC,
    '--meter-bg':t.meterBg,'--meter-border':t.meterBorder,
    '--center-bg':t.centerBg,'--center-border':t.centerBorder,
    '--servo-fill':t.servoFill,'--servo-label-color':t.servoLblC,'--phase-color':t.phaseC,
    '--knob-dot':t.knobDotC,'--led-color':t.ledC,'--led-glow':t.ledGlow,'--lbl-color':t.lblC,
    '--bottom-bg':t.bottomBg,'--bottom-border':t.bottomBorder,
    '--pwr-border':t.pwrBorder,'--pwr-led-off':t.pwrLedOff,'--pwr-led-on':t.pwrLedOn,'--pwr-led-glow':t.pwrLedGlow,
    '--btn-bg':t.btnBg,'--btn-border':t.btnBorder,'--btn-color':t.btnC,
    '--btn-active-color':t.btnActiveC,'--btn-active-bg':t.btnActiveBg,
    '--badge-bg':t.badgeBg,'--badge-border':t.badgeBorder,'--badge-color':t.badgeC,
    '--theme-bg':t.themeBg,'--theme-border':t.themeBorder,
    '--wood-color':t.wood||'transparent','--wood-display':t.wood?'block':'none'
  };
  Object.entries(p).forEach(([k,v])=>r.style.setProperty(k,v));
  document.getElementById('fpBrand').textContent=t.brand;
  document.getElementById('fpTagline').textContent=t.tagline;
  document.getElementById('fpEac').textContent=t.eac;
  document.getElementById('badgeTxt').textContent=t.badgeTxt;
  for(let i=0;i<8;i++){const b=document.getElementById('t'+i);if(b)b.className='th-btn'+(i===idx?' active':'')}
  document.querySelectorAll('.tube-orb').forEach(e=>e.remove());
  if(t.tubes&&powered){
    const fp2=document.getElementById('fp');
    for(let i=0;i<5;i++){const orb=document.createElement('div');orb.className='tube-orb';const sz=12+Math.random()*8;orb.style.cssText=`width:${sz}px;height:${sz}px;background:radial-gradient(circle,#ffee44 0%,#ff8800 45%,transparent 70%);top:${18+Math.random()*28}px;left:${100+i*90+Math.random()*30}px;animation-delay:${(Math.random()*0.6).toFixed(2)}s;animation-duration:${(1.2+Math.random()*0.8).toFixed(2)}s`;fp2.appendChild(orb);}
  }
  updateControls();
}

/* ══ CONTROLS ════════════════════════════════════════════════ */
function updateControls(){
  const pl=document.getElementById('pwrLed');if(pl)pl.className='pwr-led-top'+(powered?' on':'');
  [['btnMute',muted],['btnDim',dimmed],['btnPeak',peakOn]].forEach(([id,act])=>{const b=document.getElementById(id);if(b)b.className='flat-btn'+(act?' active':'')});
  // Always stay on content — power just dims meters to dark
  showState('content');
}
function togglePower(){powered=!powered;if(!powered){lL=0;lR=0;tL=0;tR=0;pkL=0;pkR=0;document.querySelectorAll('.tube-orb').forEach(e=>e.remove())}else if(THEMES[ci].tubes)applyTheme(ci);updateControls()}
function toggleMute(){muted=!muted;updateControls()}
function toggleDim(){dimmed=!dimmed;updateControls()}
function togglePeak(){peakOn=!peakOn;if(!peakOn){pkL=0;pkR=0}updateControls()}
function toggleChaser(){
  showNeedleChaser=!showNeedleChaser;
  const b=document.getElementById('btnChaser');
  if(b)b.className='flat-btn'+(showNeedleChaser?' active':'');
  b.textContent=showNeedleChaser?'ARC ON':'ARC OFF';
}

/* ══ STATE MANAGEMENT ════════════════════════════════════════ */
function showState(state){
  ['loading','error','empty','content'].forEach(s=>{const el=document.getElementById('state-'+s);if(el)el.style.display=s===state?'flex':'none'});
}

/* ══ iCUE STYLES ═════════════════════════════════════════════ */
function applyStyles(){
  const root=document.documentElement;
  const bgT=clamp(getIcueProperty('transparency'),0,100,100)/100;
  root.style.setProperty('--bg-opacity',String(bgT));
  const tc=getIcueProperty('textColor'),ac=getIcueProperty('accentColor'),bgc=getIcueProperty('backgroundColor');
  root.style.setProperty('--text-color',typeof tc==='string'&&tc?tc:'#e8e8e8');
  root.style.setProperty('--accent-color',typeof ac==='string'&&ac?ac:'#c8a84b');
  root.style.setProperty('--bg-color',typeof bgc==='string'&&bgc?bgc:'#141414');
  root.style.setProperty('--bg-blur',clamp(getIcueProperty('glassBlur'),0,30,0)+'px');
  root.style.setProperty('--bg-brightness',clamp(getIcueProperty('bgBrightness'),0,200,100)+'%');
  const mc=normalizeMediaConfig(getIcueProperty('backgroundImage'));
  if(mc)mediaBg.loadMedia(mc);else mediaBg.clear();
  const themeKey=getIcueProperty('ampTheme');
  if(themeKey){const idx=THEMES.findIndex(t=>t.id===themeKey);if(idx>=0&&idx!==ci)applyTheme(idx)}
  const newL=getIcueProperty('sensorLeft'),newR=getIcueProperty('sensorRight');
  if(newL&&newL!==sensorIdL)sensorIdL=newL;
  if(newR&&newR!==sensorIdR)sensorIdR=newR;
  // User customization params
  const nd=clamp(getIcueProperty('needleDamping'),10,99,95);
  needleSpd=nd/100;
  sensitivityScale=clamp(getIcueProperty('meterSensitivity'),2,12,5);
  optPeakHold=!!getIcueProperty('showPeakHold');
  // Read attack/decay/gain from iCUE properties
  needleSpd=clamp(getIcueProperty('attackSpeed'),10,99,95)/100;
  userDec=clamp(getIcueProperty('decaySpeed'),2,40,18)/100;
  meterGain=clamp(getIcueProperty('inputGain'),10,200,100)/100;
  if(optPeakHold&&!peakOn){// sync button state
    const b=document.getElementById('btnPeak');if(b)b.className='flat-btn active';
  }
}

/* ══ iCUE LIFECYCLE ══════════════════════════════════════════ */
function onIcueDataUpdated(){applyResponsiveTokens();applyStyles()}
function onIcueInitialized(){
  if(typeof ResizeObserver!=='undefined'){
    const m=document.querySelector('.widget-root');
    if(m)new ResizeObserver(()=>{applyResponsiveTokens();sizeCanvases()}).observe(m);
  }
  onIcueDataUpdated();
}

/* ══ INIT ════════════════════════════════════════════════════ */
showState('loading');
setTimeout(()=>{
  sizeCanvases();
  applyTheme(0);
  applyResponsiveTokens();
  showState('content');
  animRunning=true;
  animate();
  startAudioBridge();
},400);
if(typeof iCUE_initialized!=='undefined'&&iCUE_initialized)onIcueInitialized();else onIcueDataUpdated();
if(typeof pluginSensorsdataprovider_initialized!=='undefined'&&pluginSensorsdataprovider_initialized)onSensorPluginReady();
</script>
