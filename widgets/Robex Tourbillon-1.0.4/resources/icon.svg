<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Watch case -->
  <circle cx="32" cy="32" r="28" />
  <circle cx="32" cy="32" r="24" />
  <!-- Crown -->
  <rect x="57" y="28" width="5" height="8" rx="1" fill="#ffffff" stroke="none" />
  <!-- Hour markers -->
  <line x1="32" y1="10" x2="32" y2="14" />
  <line x1="32" y1="50" x2="32" y2="54" />
  <line x1="10" y1="32" x2="14" y2="32" />
  <line x1="50" y1="32" x2="54" y2="32" />
  <!-- Hour hand -->
  <line x1="32" y1="32" x2="32" y2="18" stroke-width="3" />
  <!-- Minute hand -->
  <line x1="32" y1="32" x2="42" y2="22" stroke-width="2" />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#ffffff" stroke="none" />
</svg>
